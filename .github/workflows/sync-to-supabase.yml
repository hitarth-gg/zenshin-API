name: Restore dump to Supabase

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "zenshin_sql.gz"

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postgres client
        run: sudo apt-get install postgresql-client

      - name: Verify dump file exists
        run: |
          if [ ! -f zenshin_sql.gz ]; then
            echo "Dump file not found!"
            exit 1
          fi
          echo "Dump file found."

      - name: Decompress dump
        run: |
          gzip -d -k zenshin_sql.gz
          if [ ! -f zenshin_sql ]; then
            echo "Decompression failed!"
            exit 1
          fi
          echo "Decompression successful."

      - name: Check pg_restore version
        run: pg_restore --version

      - name: Restore dump to Supabase
        env:
          SUPABASE_CONN: ${{ secrets.SUPABASE_CONNECTION }}
          PGSSLMODE: require
        run: |
          echo "Dropping store table..."
          psql "$SUPABASE_CONN" -c "DROP TABLE IF EXISTS public.store CASCADE;"
          if [ $? -ne 0 ]; then
            echo "Error dropping table. Exiting..."
            exit 1
          fi

          echo "Restoring schema (schema-only)..."
          psql "$SUPABASE_CONN" -f zenshin_sql
          if [ $? -ne 0 ]; then
            echo "Error restoring schema. Exiting..."
            exit 1
          fi

          echo "Restore complete."
      - name: Clear mappings server caches
        env:
          ADMIN_KEY: ${{ secrets.CACHE_ADMIN_KEY }}
          SERVER_URL_1: ${{ secrets.MAPPINGS_SERVER_URL_1 }}
          SERVER_URL_2: ${{ secrets.MAPPINGS_SERVER_URL_2 }}
        run: |
          failed=0
          for url in "$SERVER_URL_1" "$SERVER_URL_2"; do
            echo "Clearing cache on $url..."
            http_status=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X DELETE "$url/cache/all" \
              -H "x-admin-key: $ADMIN_KEY")

            echo "Response from $url:"
            cat /tmp/response.json
            echo ""

            if [ "$http_status" -ne 200 ]; then
              echo "Cache clear failed for $url with status $http_status"
              failed=1
            else
              echo "Cache cleared successfully on $url."
            fi
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
